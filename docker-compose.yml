services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clown_arena
      POSTGRES_USER: clown
      POSTGRES_PASSWORD: honkhonk
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clown -d clown_arena"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://clown:honkhonk@db:5432/clown_arena
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

volumes:
  pgdata:
